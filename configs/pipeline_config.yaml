detector:
  model_name: "yolox-s"
  weights: "weights/yolox.pth"
  input_size: [640, 640]
  conf_threshold: 0.3
  nms_threshold: 0.45
  class_names:
    - person
    - dock_open
    - truck
    - dock_closed
    - forklift
    - box_in_hand
    - pallet_load
    - no_truck
  person_class_id: 0

tracker:
  track_thresh: 0.5
  track_buffer: 30
  match_thresh: 0.8
  frame_rate: 30

reid:
  model_name: "osnet_x1_0"
  weights: "weights/osnet.pth"
  input_size: [256, 128]
  device: "cpu"

memory:
  cosine_threshold: 0.65
  max_gallery_size: 100
  feature_dim: 512

api:
  host: "0.0.0.0"
  port: 8000